priority = 3

[detection]
min_score = 5

[[detection.rules]]
type = "file_exists"
path = "Game.exe"
weight = 2

[[detection.rules]]
type = "file_exists"
path = "Game"
weight = 2

[[detection.rules]]
type = "glob_match"
