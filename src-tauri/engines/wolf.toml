[meta]
id = "wolf"
name = "WOLF RPG Editor"
category = "other"
icon = "ri:sword-line"
priority = 8
description = "WOLF RPG Editor 制作的游戏。"

[detection]
min_score = 0

[[detection.required]]
type = "dir_exists"
path = "Data/BasicData"

[[detection.required]]
type = "file_exists"
path = "Game.dat"

[[detection.optional]]
type = "file_exists"
path = "Game.exe"
weight = 1

[launch]
strategy = "bottles"
entry_patterns = ["Game.exe", "*.exe"]
exclude_patterns = ["Editor.exe", "Config.exe"]
args = []
sandbox_home = true
preserve_dirs = ["Save"]
