<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Manager</title>
  <style>
    /* 内联加载样式 - 防止 JS 加载前白屏 */
    :root {
      --loader-bg: #0a0a0a;
      --loader-text: #fafafa;
      --loader-subtext: #a1a1aa;
      --loader-accent: #3b82f6;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --loader-bg: #fafafa;
        --loader-text: #09090b;
        --loader-subtext: #71717a;
        --loader-accent: #2563eb;
      }
    }

    html, body, #app {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--loader-bg);
      font-family: system-ui, -apple-system, sans-serif;
    }

    .loader-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      background-color: var(--loader-bg);
    }

    .loader-content {
      text-align: center;
    }

    .loader-spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 16px;
      border: 3px solid var(--loader-subtext);
      border-top-color: var(--loader-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loader-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .loader-text {
      color: var(--loader-text);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .loader-subtext {
      color: var(--loader-subtext);
      font-size: 14px;
    }

    .loader-button {
      margin-top: 16px;
      padding: 8px 16px;
      background-color: var(--loader-accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    .loader-button:hover {
      opacity: 0.9;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="app">
    <!-- 初始加载状态 - JS 加载后会被 React 替换 -->
    <div class="loader-container">
      <div class="loader-content">
        <div class="loader-spinner"></div>
        <div class="loader-text">GameManager</div>
        <div class="loader-subtext">正在加载...</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
