<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Manager</title>
  <script>
    // 加载前从后端获取系统主题，避免闪白/闪黑
    (function () {
      try {
        var theme = localStorage.getItem('gm_theme');
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else if (theme === 'light' || !theme) {
          // system 或无记录 — 先按浅色渲染，等 Rust 检测结果
          document.documentElement.classList.remove('dark');
        }
      } catch (_) { }
    })();
  </script>
  <style>
    html,
    body {
      height: 100vh;
      margin: 0;
      padding: 0;
      background-color: transparent !important;
      overflow: hidden;
    }

    #app {
      height: 100vh;
      background-color: oklch(1 0 0);
      border-radius: 12px;
      overflow: hidden;
    }

    :is(.dark) #app {
      background-color: oklch(0.145 0 0);
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
    }

    .loader-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
    }

    .loader-content {
      text-align: center;
    }

    .loader-spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 16px;
      border: 3px solid oklch(0.9 0 0);
      border-top-color: oklch(0.5 0 0);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    :is(.dark) .loader-spinner {
      border-color: oklch(0.25 0 0);
      border-top-color: oklch(0.7 0 0);
    }

    .loader-text {
      color: oklch(0.145 0 0);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    :is(.dark) .loader-text {
      color: oklch(0.985 0 0);
    }

    .loader-subtext {
      color: oklch(0.556 0 0);
      font-size: 14px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="loader-container">
      <div class="loader-content">
        <div class="loader-spinner"></div>
        <div class="loader-text">GameManager</div>
        <div class="loader-subtext">正在加载...</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
